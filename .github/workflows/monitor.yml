name: Job monitor

on:
  schedule:
    - cron: "*/15 * * * *" # every ~15 min (GitHub cron is best-effort)
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm start
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TRACKER_USER_ID: ${{ secrets.TRACKER_USER_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          ALERT_EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}
          # Optional behavior (set as repo Variables, not Secrets):
          SKIP_NO_SPONSORSHIP: ${{ vars.SKIP_NO_SPONSORSHIP }}
          MAX_AGE_DAYS: ${{ vars.MAX_AGE_DAYS }}
          MAX_ALERTS_PER_RUN: ${{ vars.MAX_ALERTS_PER_RUN }}
          WORKDAY_MAX_RESULTS: ${{ vars.WORKDAY_MAX_RESULTS }}
